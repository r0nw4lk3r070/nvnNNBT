services:

  # ── UI: nginx reverse proxy — entry point for users ─────────────────────
  ui:
    build:
      context: ./services/ui
      dockerfile: Dockerfile
    container_name: nvnnnbt-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-7445}:80"
    depends_on:
      factory:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── Factory: Agent Factory backend (FastAPI) ───────────────────────────────
  factory:
    build:
      context: ./services/factory
      dockerfile: Dockerfile
    container_name: nvnnnbt-factory
    restart: unless-stopped
    ports:
      - "${FACTORY_PORT:-4000}:4000"
    environment:
      AGENT_URL: http://agent:6161
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      DB_PATH: /app/data/factory.db
      WORKSPACES_ROOT: /app/data/workspaces
      SANDBOX_ROOT: /app/sandbox/workspaces
      # HOST_PROJECT_PATH: absolute path to this folder on the HOST machine.
      # Required for spawning agents (bind-mounts workspace folders).
      # Example: HOST_PROJECT_PATH=E:/nvnNNBT
      HOST_PROJECT_PATH: ${HOST_PROJECT_PATH:-}
      AGENT_IMAGE: nvnnnbt-agent:latest
      COMPOSE_NETWORK: nvnnnbt-net
      FACTORY_TOKEN: ${FACTORY_TOKEN:-}
      # Port bands for spawned agents. Offset per instance to avoid host-port collisions.
      # Default: chat 4330-4399, gateway 4230-4299. NEVEN instance: 4430-4499 / 4330-4399 etc.
      AGENT_CHAT_PORT_BASE: ${AGENT_CHAT_PORT_BASE:-4330}
      AGENT_GATEWAY_PORT_BASE: ${AGENT_GATEWAY_PORT_BASE:-4230}
      # Set to your physical host RAM in MB so the dashboard shows real memory.
      # Example: 32768 for 32 GB. Leave 0 to use container-visible RAM (WSL2 limit).
      HOST_RAM_MB: ${HOST_RAM_MB:-0}
      # Room chat — peer federation
      PEER_URL: ${PEER_URL:-}
      USER_NAME: ${USER_NAME:-user}
    volumes:
      - ./data:/app/data
      - ./data/workspaces:/app/data/workspaces
      - ./workspace/workspaces:/app/sandbox/workspaces:ro
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Nanobot agent: chat server + lab ────────────────────────────────────
  # The image is tagged so spawned containers (via API) can reference it.
  agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    image: nvnnnbt-agent:latest
    container_name: nvnnnbt-agent
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-6161}:6161"
    environment:
      WORKSPACE_PATH: /workspace
      SKILLSETS_PATH: /workspace/workspaces
      AGENT_PORT: 6161
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      GROK_API_KEY: ${GROK_API_KEY:-}
    volumes:
      - ./workspace:/workspace
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6161/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 150s

  # ── Chrome: headless Chromium for browser-harness (CDP) ────────────────
  # Exposes the Chrome DevTools Protocol on port 9222.
  # The browser-harness daemon resolves the WS URL via BU_CDP_HTTP.
  chrome:
    image: zenika/alpine-chrome:latest
    command:
      - "--no-sandbox"
      - "--headless"
      - "--remote-debugging-address=0.0.0.0"
      - "--remote-debugging-port=9222"
      - "--remote-allow-origins=*"
      - "--disable-gpu"
      - "--disable-dev-shm-usage"
    restart: unless-stopped
    ports:
      - "${CHROME_PORT:-9222}:9222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9222/json/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Ollama: local LLM inference ──────────────────────────────────────────
  # Only started with: docker compose --profile bundled-ollama up
  # Default: host Ollama via host.docker.internal (set in .env)
  ollama:
    profiles: [bundled-ollama]
    image: ollama/ollama:latest
    container_name: nvnnnbt-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  ollama-data:
    driver: local

  # agent-data is used by the API (SQLite DB)
  # Workspaces for spawned agents live in ./data/workspaces/ (bind mount)

networks:
  default:
    name: nvnnnbt-net
