services:

  # ── UI: nginx reverse proxy — entry point for users ─────────────────────
  ui:
    build:
      context: ./services/ui
      dockerfile: Dockerfile
    container_name: nvnnnbt-ui
    restart: unless-stopped
    ports:
      - "${UI_PORT:-3000}:80"
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  # ── API: Express proxy + agent spawn orchestrator ──────────────────────────
  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: nvnnnbt-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      PORT: 4000
      AGENT_URL: http://agent:6161
      API_KEY: ${API_KEY:-}
      DB_PATH: /app/data/nanobot.db
      # HOST_PROJECT_PATH: absolute path to this folder on the HOST machine.
      # Required for spawning agents (bind-mounts workspace folders).
      # Example: HOST_PROJECT_PATH=/home/derek/nvnNNBT
      HOST_PROJECT_PATH: ${HOST_PROJECT_PATH:-}
      AGENT_IMAGE: nvnnnbt-agent:latest
      COMPOSE_NETWORK: nvnnnbt-net
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      agent:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nanobot agent: chat server + lab ────────────────────────────────────
  # The image is tagged so spawned containers (via API) can reference it.
  agent:
    build:
      context: ./services/agent
      dockerfile: Dockerfile
    image: nvnnnbt-agent:latest
    container_name: nvnnnbt-agent
    restart: unless-stopped
    ports:
      - "${AGENT_PORT:-6161}:6161"
    environment:
      WORKSPACE_PATH: /workspace
      SKILLSETS_PATH: /skill-sets
      AGENT_PORT: 6161
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      GROK_API_KEY: ${GROK_API_KEY:-}
    volumes:
      - ./workspace:/workspace
      - ./skill-sets:/skill-sets
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:6161/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Ollama: local LLM inference ──────────────────────────────────────────
  # Only started with: docker compose --profile bundled-ollama up
  # Default: host Ollama via host.docker.internal (set in .env)
  ollama:
    profiles: [bundled-ollama]
    image: ollama/ollama:latest
    container_name: nvnnnbt-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  ollama-data:
    driver: local

  # agent-data is used by the API (SQLite DB)
  # Workspaces for spawned agents live in ./data/workspaces/ (bind mount)

networks:
  default:
    name: nvnnnbt-net
