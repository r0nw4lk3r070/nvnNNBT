server {
    listen 80;
    server_name _;

    # ── Agents management page — static HTML ─────────────────────────────
    location = /agents {
        root  /usr/share/nginx/html;
        index agents.html;
        try_files /agents.html =404;
    }

    # ── Agents REST API — proxy to Express service ────────────────────────
    location /api/agents {
        proxy_pass         http://api:4000/agents;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── SSE streams (chat, lab/chat) — must not be buffered ──────────────
    location ~ ^/(chat|lab/chat|stop|lab/stop)$ {
        proxy_pass         http://agent:6161;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── API calls (short-lived JSON) ─────────────────────────────────────
    location /api/ {
        proxy_pass         http://agent:6161/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Lab page ─────────────────────────────────────────────────────────
    location /lab {
        proxy_pass         http://agent:6161/lab;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Root (Art chat page) ──────────────────────────────────────────────
    location / {
        proxy_pass         http://agent:6161/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Local health check (no upstream required) ────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
