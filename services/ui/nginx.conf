server {
    listen 80;
    server_name _;

    # ── SPA shell — serve index.html at root ──────────────────────────────
    location = / {
        root  /usr/share/nginx/html;
        try_files /index.html =404;
    }

    # ── Legacy agents management page — static HTML ───────────────────────
    location = /agents {
        root  /usr/share/nginx/html;
        try_files /agents.html =404;
    }

    # ── Factory API — SSE streams (events/stream) — must not be buffered ─────
    location /api/factory/events/stream {
        proxy_pass         http://factory:4000/events/stream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── Factory sandbox chat — SSE, must not be buffered ─────────────────
    location = /api/factory/sandbox/chat {
        proxy_pass         http://factory:4000/sandbox/chat;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── Factory API — all other routes (short-lived JSON) ─────────────────
    location /api/factory/ {
        proxy_pass         http://factory:4000/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── SSE streams (chat, lab/chat) — must not be buffered ──────────────
    location ~ ^/(chat|lab/chat|stop|lab/stop)$ {
        proxy_pass         http://agent:6161;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   Connection '';
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # ── API calls to agent service (short-lived JSON) ─────────────────────
    location /api/ {
        proxy_pass         http://agent:6161/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # ── Lab page (legacy) ─────────────────────────────────────────────────
    location /lab {
        proxy_pass         http://agent:6161/lab;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Local health check (no upstream required) ────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
